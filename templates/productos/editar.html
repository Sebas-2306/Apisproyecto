{% extends "layouts/base.html" %}

{% block titulo %}
Editar Producto
{% endblock %}

{% block contenido %}

<h2 class="mb-4">Editar Producto</h2>

<form action="/productos/actualizar" method="POST">

    <input
        type="hidden"
        name="id_producto"
        value="{{ producto.id_producto }}">

    <div class="mb-3">
        <label>Nombre</label>
        <input
            type="text"
            name="nombre"
            class="form-control"
            value="{{ producto.nombre }}"
            required>
    </div>

    <div class="mb-3">
        <label>Descripción</label>
        <textarea
            name="descripcion"
            class="form-control">{{ producto.descripcion }}</textarea>
    </div>

    <div class="mb-3">
        <label>Código de barras</label>
        <input
            type="text"
            name="codigo_barras"
            class="form-control"
            value="{{ producto.codigo_barras }}">
    </div>

    <div class="mb-3">
        <label>Categoría</label>

        <select
            name="id_categoria"
            class="form-select"
            required>

            {% for categoria in categorias %}

            <option
                value="{{ categoria.id_categoria }}"
                {% if categoria.id_categoria == producto.id_categoria %}selected{% endif %}>

                {{ categoria.nombre }}

            </option>

            {% endfor %}

        </select>

    </div>

    <div class="row">

        <div class="col-md-3">

            <label>Precio Compra</label>

            <input
                type="number"
                step="0.01"
                name="precio_compra"
                class="form-control"
                value="{{ producto.precio_compra }}">

        </div>

        <div class="col-md-3">

            <label>Precio Venta</label>

            <input
                type="number"
                step="0.01"
                name="precio_venta"
                class="form-control"
                value="{{ producto.precio_venta }}">

        </div>

        <div class="col-md-3">

            <label>Stock</label>

            <input
                type="number"
                name="stock"
                class="form-control"
                value="{{ producto.stock }}">

        </div>

        <div class="col-md-3">

            <label>Stock mínimo</label>

            <input
                type="number"
                name="stock_minimo"
                class="form-control"
                value="{{ producto.stock_minimo }}">

        </div>

    </div>

    <br>

    <button class="btn btn-success">
        Actualizar Producto
    </button>

    <a href="/productos" class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
