{% extends "layouts/base.html" %}

{% block titulo %}
Nueva Categoría
{% endblock %}

{% block contenido %}

<h2 class="mb-4">Nueva Categoría</h2>

<form action="/categorias/guardar" method="POST">

    <div class="mb-3">

        <label class="form-label">
            Nombre
        </label>

        <input
            type="text"
            name="nombre"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Descripción
        </label>

        <textarea
            name="descripcion"
            class="form-control"
            rows="4"></textarea>

    </div>

    <button class="btn btn-success">
        Guardar
    </button>

    <a href="/categorias" class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
