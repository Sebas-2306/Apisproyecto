{% extends "layouts/base.html" %}

{% block titulo %}
Categorías
{% endblock %}

{% block contenido %}

<h2 class="mb-4">
    Categorías
</h2>

<table class="table table-striped table-bordered">

    <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Nombre</th>

            <th>Descripción</th>

        </tr>

    </thead>

    <tbody>

        {% for categoria in categorias %}

        <tr>

            <td>{{ categoria.id_categoria }}</td>

            <td>{{ categoria.nombre }}</td>

            <td>{{ categoria.descripcion }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
